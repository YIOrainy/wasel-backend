services:
  postgres:
    image: postgres:16
    container_name: wasel-postgres
    environment:
      POSTGRES_USER: wasel
      POSTGRES_PASSWORD: wasel
      POSTGRES_DB: wasel
    ports:
      - "5432:5432"
    volumes:
      - wasel_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wasel -d wasel"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: wasel-redis
    ports:
      - "6379:6379"
    volumes:
      - wasel_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build: .
    container_name: wasel-backend
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"

volumes:
  wasel_pg_data:
  wasel_redis_data:
