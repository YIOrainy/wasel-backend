services:
  postgres:
    image: postgres:16
    container_name: wasel-postgres
    environment:
      POSTGRES_USER: wasel
      POSTGRES_PASSWORD: wasel
      POSTGRES_DB: wasel
    ports:
      - "5432:5432"
    volumes:
      - wasel_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wasel -d wasel"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: wasel-redis
    ports:
      - "6379:6379"
    volumes:
      - wasel_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build: .
    container_name: wasel-backend
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    # Healthy once uvicorn responds — which is after `alembic upgrade head` has
    # run (so the procrastinate schema exists before the worker starts).
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/readyz')"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  worker:
    build: .
    container_name: wasel-worker
    env_file:
      - .env
    environment:
      PYTHONPATH: /app
    depends_on:
      app:
        condition: service_healthy
    # The worker only processes jobs — the API enqueues them. The Procrastinate
    # schema is installed by Alembic (the app service runs `alembic upgrade head`).
    command: procrastinate --app=app.jobs.app.procrastinate_app worker

volumes:
  wasel_pg_data:
  wasel_redis_data:
